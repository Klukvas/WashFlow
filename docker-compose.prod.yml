services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-washflow}
      POSTGRES_USER: ${POSTGRES_USER:-washflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-washflow}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'REDISCLI_AUTH=$REDIS_PASSWORD redis-cli ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${DOCKER_IMAGE:-washflow/app}:${DOCKER_TAG:-latest}
    restart: unless-stopped
    expose:
      - '3000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-washflow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-washflow}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGINS: ${CORS_ORIGINS:-https://washflow.app}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      SENTRY_DSN: ${SENTRY_DSN:-}
      GRAFANA_LOKI_HOST: ${GRAFANA_LOKI_HOST:-}
      GRAFANA_LOKI_USERNAME: ${GRAFANA_LOKI_USERNAME:-}
      GRAFANA_LOKI_PASSWORD: ${GRAFANA_LOKI_PASSWORD:-}
      FRONTEND_URL: ${FRONTEND_URL:-https://washflow.app}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      PADDLE_API_KEY: ${PADDLE_API_KEY:-}
      PADDLE_CLIENT_TOKEN: ${PADDLE_CLIENT_TOKEN:-}
      PADDLE_WEBHOOK_SECRET: ${PADDLE_WEBHOOK_SECRET:-}
      PADDLE_SANDBOX: 'false'
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/main.js"
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    image: ${DOCKER_IMAGE_FRONTEND:-washflow/frontend}:${DOCKER_TAG:-latest}
    build:
      context: ./frontend
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:80/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  uploads_data:
