version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-washflow}
      POSTGRES_USER: ${POSTGRES_USER:-washflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-washflow_secret}
    ports:
      - '5433:5432'
    volumes:
      - postgres_dev:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  postgres_dev:
