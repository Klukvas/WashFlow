version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: washflow_dev
      POSTGRES_USER: washflow_dev
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-washflow_dev_secret}
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  postgres_dev:
