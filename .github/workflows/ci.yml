name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci'
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/washflow

jobs:
  # ──────────────────────────────────────────────────────────────────
  # 1. Lint (backend + frontend in parallel)
  # ──────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        continue-on-error: true

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────
  # 2. Unit tests (backend + frontend in parallel)
  # ──────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: [backend-lint]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: npx prisma generate

      - name: Run unit tests with coverage
        run: pnpm test:cov

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/
          retention-days: 7

  frontend-test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

  # ──────────────────────────────────────────────────────────────────
  # 3. E2E tests (backend + frontend, needs full stack)
  # ──────────────────────────────────────────────────────────────────
  backend-e2e:
    name: Backend E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: washflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: 'postgresql://ci:ci@localhost:5432/washflow_test'
      REDIS_URL: 'redis://localhost:6379'
      JWT_ACCESS_SECRET: 'ci-test-access-secret-minimum-32-chars!'
      JWT_REFRESH_SECRET: 'ci-test-refresh-secret-minimum-32-chars!'
      JWT_ACCESS_EXPIRATION: '15m'
      JWT_REFRESH_EXPIRATION: '7d'
      NODE_ENV: 'test'
      CORS_ORIGINS: '*'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: npx prisma generate

      - name: Reset database
        run: npx prisma migrate reset --force

      - name: Seed database
        run: npx prisma db seed
        continue-on-error: true

      - name: Run E2E tests
        run: pnpm test:e2e --runInBand --forceExit

  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: washflow_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: 'postgresql://ci:ci@localhost:5432/washflow_e2e'
      REDIS_URL: 'redis://localhost:6379'
      JWT_ACCESS_SECRET: 'ci-test-access-secret-minimum-32-chars!'
      JWT_REFRESH_SECRET: 'ci-test-refresh-secret-minimum-32-chars!'
      JWT_ACCESS_EXPIRATION: '15m'
      JWT_REFRESH_EXPIRATION: '7d'
      NODE_ENV: 'test'
      CORS_ORIGINS: 'http://localhost:5173'
      PORT: '3003'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm install --frozen-lockfile
        working-directory: frontend

      - run: npx prisma generate

      - name: Reset database
        run: npx prisma migrate reset --force

      - name: Seed database
        run: npx prisma db seed
        continue-on-error: true

      - name: Build backend
        run: pnpm build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Start backend
        run: |
          nohup node dist/src/main.js > backend.log 2>&1 &
          echo $! > backend.pid
          echo "Backend PID: $(cat backend.pid)"

      - name: Wait for backend to be ready
        run: |
          PID=$(cat backend.pid)
          for i in $(seq 1 30); do
            if curl -s http://localhost:3003/api/v1 > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            if ! kill -0 "$PID" 2>/dev/null; then
              echo "Backend process died!"
              echo "--- Backend log ---"
              cat backend.log || true
              exit 1
            fi
            echo "Waiting... attempt $i"
            sleep 2
          done

      - name: Run Playwright E2E tests
        run: npx playwright test --reporter=list
        working-directory: frontend
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: frontend/test-results/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────
  # 4. Build & push Docker image (only on main)
  # ──────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend-e2e, frontend-e2e]
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────
  # 5. Deploy to Hetzner (only on main)
  # ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build-and-push]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Generate .env file
        run: |
          {
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
            echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}"
            echo "JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}"
            echo "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}"
            echo "CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}"
          } > .env.production
          chmod 600 .env.production

      - name: Copy files to server
        run: |
          scp -i ~/.ssh/deploy_key \
            docker-compose.prod.yml .env.production \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/washflow/

      - name: Deploy via SSH
        run: |
          DOCKER_IMG="${{ env.DOCKER_IMAGE }}"
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "DOCKER_IMG=${DOCKER_IMG}" bash --login -s << 'DEPLOY_SCRIPT'
            set -euo pipefail
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
            cd /opt/washflow

            # Install .env from pipeline secrets
            chmod 600 .env.production
            mv -f .env.production .env

            # Rename compose file
            mv -f docker-compose.prod.yml docker-compose.yml

            # Pull the latest image
            docker pull "${DOCKER_IMG}:latest" || true

            # Bring up the stack (recreates only changed services)
            docker compose up -d --remove-orphans

            # Wait for backend health check
            echo "Waiting for backend to be healthy..."
            for i in $(seq 1 30); do
              if docker compose exec -T backend wget -qO- http://localhost:3000/api/v1/health > /dev/null 2>&1; then
                echo "Backend is healthy!"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Backend failed health check after 60s"
                docker compose logs backend --tail=50
                exit 1
              fi
              sleep 2
            done

            # Clean up old dangling images
            docker image prune -f --filter "until=24h"
          DEPLOY_SCRIPT

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          rm -f .env.production
