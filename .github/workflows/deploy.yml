name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/washflow
  DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci'

jobs:
  # ──────────────────────────────────────────────────────────────────
  # 1. Run all tests before building
  # ──────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: npx prisma generate

      - name: Run backend unit tests
        run: pnpm test -- --passWithNoTests

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Run frontend unit tests
        run: pnpm test

  # ──────────────────────────────────────────────────────────────────
  # 2. Build & push Docker image to Docker Hub
  # ──────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────
  # 3. Deploy to Hetzner via SSH
  # ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Generate .env file
        run: |
          cat > .env.production << 'HEADER'
          # Auto-generated by GitHub Actions — do not edit manually
          HEADER
          {
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
            echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}"
            echo "JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}"
            echo "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}"
            echo "CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}"
          } >> .env.production

      - name: Copy files to server
        run: |
          scp -i ~/.ssh/deploy_key \
            docker-compose.prod.yml .env.production \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/washflow/

      - name: Deploy via SSH
        run: |
          DOCKER_IMG="${{ env.DOCKER_IMAGE }}"
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "DOCKER_IMG=${DOCKER_IMG}" bash -s << 'DEPLOY_SCRIPT'
            set -euo pipefail
            cd /opt/washflow

            # Install .env from pipeline secrets
            chmod 600 .env.production
            mv -f .env.production .env

            # Rename compose file
            mv -f docker-compose.prod.yml docker-compose.yml

            # Pull the latest image
            docker pull "${DOCKER_IMG}:latest" || true

            # Bring up the stack (recreates only changed services)
            docker compose up -d --remove-orphans

            # Wait for backend health check
            echo "Waiting for backend to be healthy..."
            for i in $(seq 1 30); do
              if docker compose exec -T backend wget -qO- http://localhost:3000/api/v1/health > /dev/null 2>&1; then
                echo "Backend is healthy!"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Backend failed health check after 60s"
                docker compose logs backend --tail=50
                exit 1
              fi
              sleep 2
            done

            # Clean up old dangling images
            docker image prune -f --filter "until=24h"
          DEPLOY_SCRIPT

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          rm -f .env.production
