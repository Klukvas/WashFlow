version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: washflow
      POSTGRES_USER: washflow
      POSTGRES_PASSWORD: washflow_secret
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U washflow']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://washflow:washflow_secret@postgres:5432/washflow
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: k8Xm2pQ9vL4wR7tB3nJ6hY0cF5dA1sGzUeWoIiMxNbVqKjTfHlDrCyPuEaZgOS
      JWT_REFRESH_SECRET: W3mR7vX1pL9tK4nB8hJ0cF6dA2sGyUeZoIiMxNbVqQjTfHlDrCaPuEwYgOSkX5z
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push && node dist/prisma/seed.js && node dist/src/main.js"

volumes:
  postgres_data:
  redis_data:
